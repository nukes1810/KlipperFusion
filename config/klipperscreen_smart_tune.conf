#####################################################################
#         KlipperScreen - Smart Tune Panel                          #
#         Place in ~/printer_data/config/                           #
#         Add [include klipperscreen_smart_tune.conf] to            #
#         your KlipperScreen.conf                                   #
#####################################################################

[menu __main Smart Tune]
name: Smart Tune
icon: tunning

[menu __main Smart Tune accel_full]
name: Accel Full
icon: speed_high
method: printer.gcode.script
params: {"script": "ACCEL_FULL"}

[menu __main Smart Tune accel_medium]
name: Accel Medium
icon: speed_medium
method: printer.gcode.script
params: {"script": "ACCEL_MEDIUM"}

[menu __main Smart Tune accel_conservative]
name: Accel Safe
icon: speed_low
method: printer.gcode.script
params: {"script": "ACCEL_CONSERVATIVE"}

[menu __main Smart Tune run_shaper]
name: Run Shaper
icon: vibration
method: printer.gcode.script
params: {"script": "AUTO_SHAPER_CALIBRATE"}

[menu __main Smart Tune tune_status]
name: Tune Status
icon: info
method: printer.gcode.script
params: {"script": "TUNE_STATUS"}

[menu __main Smart Tune heat_soak_asa]
name: Heat Soak ASA
icon: heat-up
method: printer.gcode.script
params: {"script": "HEAT_SOAK CHAMBER_TEMP=40"}

[menu __main Smart Tune heat_soak_abs]
name: Heat Soak ABS
icon: heat-up
method: printer.gcode.script
params: {"script": "HEAT_SOAK CHAMBER_TEMP=40"}
